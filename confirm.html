<!DOCTYPE html>
<html>

<head>
<title>Confirm Plan</title>

<style>

body{
font-family:Arial;
background:#f5f7fb;
text-align:center;
margin-top:60px;
padding:20px;
}

h1{
font-size:36px;
}

.mealContainer{
display:flex;
justify-content:center;
gap:20px;
margin-top:10px;
}

.mealBtn{
background:#e0e0e0;
color:black;
padding:14px 30px;
font-size:18px;
border:none;
border-radius:25px;
cursor:pointer;
transition:0.2s;
}

.mealBtn.active{
background:#4CAF50;
color:white;
transform:scale(1.05);
}

button{
padding:14px 28px;
font-size:18px;
margin:10px;
border:none;
border-radius:20px;
cursor:pointer;
}

#confirmBtn{
background:#4CAF50;
color:white;
}

input{
padding:12px;
font-size:16px;
margin:10px;
border-radius:8px;
border:1px solid #ccc;
width:220px;
}

#emailSection{
display:none;
margin-top:20px;
}

#dateSection{
display:none;
margin-top:20px;
}

#confirmMsg{
margin-top:20px;
font-size:18px;
font-weight:bold;
color:green;
}

</style>

</head>

<body>

<h1>Good choice 🙂</h1>

<p>The NO button was never really an option.</p>

<br>

<img src="https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3Mzh6YXJjbnprNzRvM2JpaW1ybWo2aGNiN240b202ZnJhN2VjemFreiZlcD12MV9naWZzX3NlYXJjaCZjdD1n/U4LhzzpfTP7NZ4UlmH/giphy.gif" width="220">

<br><br>

<h2>What would you prefer?</h2>

<div class="mealContainer">
<button id="lunchBtn" class="mealBtn" onclick="selectMeal('Lunch')">Lunch</button>
<button id="dinnerBtn" class="mealBtn" onclick="selectMeal('Dinner')">Dinner</button>
</div>

<div id="emailSection">

<p>Nice choice! Let me grab your email.</p>

<input id="email" type="email" placeholder="Enter your email">

<br>

<button onclick="showDate()">Continue</button>

</div>

<div id="dateSection">

<h2>Select a date</h2>

<input type="date" id="date">

<br>

<button id="confirmBtn" onclick="confirmDate()">Confirm</button>

<p id="confirmMsg"></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

emailjs.init("pc92_5qw64XCzTiJA")

let mealChoice = ""

function selectMeal(choice){

mealChoice = choice

document.getElementById("emailSection").style.display="block"

document.getElementById("lunchBtn").classList.remove("active")
document.getElementById("dinnerBtn").classList.remove("active")

if(choice==="Lunch"){
document.getElementById("lunchBtn").classList.add("active")
}

if(choice==="Dinner"){
document.getElementById("dinnerBtn").classList.add("active")
}

}

function showDate(){

let email=document.getElementById("email").value

if(!email){
alert("Please enter your email")
return
}

document.getElementById("dateSection").style.display="block"

}

function confirmDate(){

let email=document.getElementById("email").value
let date=document.getElementById("date").value
let btn=document.getElementById("confirmBtn")

if(!date){
document.getElementById("confirmMsg").innerText="Please select a date."
return
}

btn.disabled=true
btn.innerText="Sending..."

emailjs.send(
"service_014fkwn",
"template_lap32gl",
{
email:email,
date:date,
meal:mealChoice
},
"pc92_5qw64XCzTiJA"
)

.then(function(){
document.getElementById("confirmMsg").innerText="✅ Date confirmed! Looking forward to it."
btn.innerText="Confirmed"
})

.catch(function(error){
console.log(error)
document.getElementById("confirmMsg").innerText="❌ Email failed to send."
btn.disabled=false
btn.innerText="Confirm"
})

}

</script>

</body>

</html>
